"$schema" = 'https://starship.rs/config-schema.json'

# Rose Pine Dawn — light theme
format = """$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

add_newline = true

palette = 'rose-pine'

[palettes.rose-pine]
dir      = '#56949f'
branch   = '#907aa9'
status   = '#ea9d34'
char_ok  = '#286983'
char_err = '#b4637a'
muted    = '#9893a5'
node     = '#286983'
python   = '#56949f'
rust     = '#b4637a'
go       = '#286983'
duration = '#ea9d34'

[directory]
style            = 'bold dir'
format           = '[$path]($style)[$read_only]($style) '
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = ' '
style  = 'branch'
format = 'on [$symbol$branch(:$remote_branch)]($style) '

[git_status]
style     = 'status'
format    = '([$all_status$ahead_behind]($style) )'
conflicted = '⚡'
ahead      = '⬆${count}'
behind     = '⬇${count}'
diverged   = '⬆${ahead_count}⬇${behind_count}'
untracked  = '?'
stashed    = '≡'
modified   = '!'
staged     = '+'
renamed    = '»'
deleted    = '✘'

[nodejs]
symbol = ' '
style  = 'node'
format = '[${symbol}${version}]($style) '

[python]
symbol = ' '
style  = 'python'
format = '[${symbol}${version}(\($virtualenv\))]($style) '

[rust]
symbol = ' '
style  = 'rust'
format = '[${symbol}${version}]($style) '

[golang]
symbol = ' '
style  = 'go'
format = '[${symbol}${version}]($style) '

[cmd_duration]
min_time = 2000
style    = 'duration'
format   = '[took $duration]($style) '

[character]
success_symbol = '[❯](bold char_ok)'
error_symbol   = '[❯](bold char_err)'
