"$schema" = 'https://starship.rs/config-schema.json'

format = """$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

add_newline = true

palette = 'gruvbox'

[palettes.gruvbox]
dir      = '#7daea3'
branch   = '#d3869b'
status   = '#d8a657'
char_ok  = '#a9b665'
char_err = '#ea6962'
muted    = '#928374'
node     = '#a9b665'
python   = '#7daea3'
rust     = '#ea6962'
go       = '#89b482'
duration = '#d8a657'

[directory]
style            = 'bold dir'
format           = '[$path]($style)[$read_only]($style) '
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = ' '
style  = 'branch'
format = 'on [$symbol$branch(:$remote_branch)]($style) '

[git_status]
style     = 'status'
format    = '([$all_status$ahead_behind]($style) )'
conflicted = '⚡'
ahead      = '⬆${count}'
behind     = '⬇${count}'
diverged   = '⬆${ahead_count}⬇${behind_count}'
untracked  = '?'
stashed    = '≡'
modified   = '!'
staged     = '+'
renamed    = '»'
deleted    = '✘'

[nodejs]
symbol = ' '
style  = 'node'
format = '[${symbol}${version}]($style) '

[python]
symbol = ' '
style  = 'python'
format = '[${symbol}${version}(\($virtualenv\))]($style) '

[rust]
symbol = ' '
style  = 'rust'
format = '[${symbol}${version}]($style) '

[golang]
symbol = ' '
style  = 'go'
format = '[${symbol}${version}]($style) '

[cmd_duration]
min_time = 2000
style    = 'duration'
format   = '[took $duration]($style) '

[character]
success_symbol = '[❯](bold char_ok)'
error_symbol   = '[❯](bold char_err)'
